<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil Personal</title>
    <link rel="stylesheet" href="lesson-6-profile-starter.css">
</head>
<body>
    <div class="perfil">
        <img class="foto-perfil" src="https://placehold.co/160x160/0f766e/ffffff?text=Foto" alt="Foto de perfil">

        <h1>Tu nombre</h1>
        <p class="rol">Estudiante de desarrollo web</p>

        <p class="descripcion">
            Escribe una breve presentacion sobre ti. Puedes contar que te gusta aprender,
            que tecnologias estas practicando y que tipo de pagina quieres crear.
        </p>

        <h2>Mis habilidades</h2>
        <ul class="habilidades">
            <li>HTML</li>
            <li>CSS</li>
            <li>Creatividad</li>
        </ul>

        <a class="boton" href="https://developer.mozilla.org/es/" target="_blank">
            Seguir aprendiendo
        </a>
    </div>
</body>
</html>
