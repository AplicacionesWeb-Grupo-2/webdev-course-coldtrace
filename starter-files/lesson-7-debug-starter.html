<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revision de mi Perfil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f8fafc;
            font-family: Arial, sans-serif;
            color: #1f2937;
        }

        /* Error 1: esta clase no coincide con la clase del HTML */
        .perfil-card {
            max-width: 520px;
            margin: 50px auto;
            background-color: white;
            padding: 30px;
            border 3px solid #2563eb;

            text-align: center;
        }

        .foto-perfil {
            width: 140px;
            height: 140px;
            border-radius: 50%;
        }

        .boton {
            display: inline-block;
            margin-top: 20px;
            background-color: #2563eb;

            padding: 12px 20px;
            border-radius: 12px;
            text-decoration: none;
        }

</head>
<body>
    <div class="perfil">
        <img class="foto-perfil" src="https://placehold.co/160x160/2563eb/ffffff?text=Foto">

        <h1>Mi perfil personal
        <p>Esta pagina casi esta lista, pero tiene algunos errores comunes.</p>

        <ul>
            <li>Revisar etiquetas</li>
            <li>Revisar clases de CSS</li>
            <li>Revisar enlaces</li>

            Ver documentacion
