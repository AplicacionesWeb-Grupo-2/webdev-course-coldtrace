<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Perfil</title>

  <!-- =============================================
       PASO 1: VINCULAR CSS
       Aquí agregaremos la etiqueta <link> para
       conectar nuestro archivo styles.css
  ============================================= -->

</head>
<body>

  <header>
    <h1>Hola, soy Ana</h1>
    <p>Estudiante de secundaria · Lima, Perú</p>
  </header>

  <!-- =============================================
       PASO 2: SELECTORES DE CLASE
       Agregaremos el atributo class="destacado"
       a este párrafo para luego aplicarle estilos
       específicos desde el CSS
  ============================================= -->
  <section>
    <h2>Sobre mí</h2>
    <p>Me gusta la música, los videojuegos y aprender cosas nuevas.</p>
  </section>

  <!-- =============================================
       PASO 3: COLOR Y BACKGROUND-COLOR
       Usaremos el selector de esta sección para
       demostrar color de texto y color de fondo
  ============================================= -->
  <section>
    <h2>Mis hobbies</h2>
    <ul>
      <li>Tocar guitarra</li>
      <li>Leer manga</li>
      <li>Programar</li>
    </ul>
  </section>

  <!-- =============================================
       PASO 4: FONT-FAMILY
       Aplicaremos font-family al body desde el CSS
       para cambiar la fuente de toda la página
  ============================================= -->

  <footer>
    <p>Hecho con HTML y CSS</p>
  </footer>

</body>
</html>
