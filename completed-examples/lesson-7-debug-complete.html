<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revision de mi Perfil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f8fafc;
            font-family: Arial, sans-serif;
            color: #1f2937;
        }

        .perfil {
            max-width: 520px;
            margin: 50px auto;
            background-color: white;
            padding: 30px;
            border: 3px solid #2563eb;
            border-radius: 20px;
            text-align: center;
        }

        .foto-perfil {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid #2563eb;
        }

        .perfil h1 {
            color: #2563eb;
            margin-top: 18px;
            margin-bottom: 12px;
        }

        .perfil p {
            line-height: 1.6;
            margin-bottom: 18px;
        }

        .perfil ul {
            margin: 18px 0;
            list-style-position: inside;
        }

        .perfil li {
            margin: 8px 0;
        }

        .boton {
            display: inline-block;
            margin-top: 20px;
            background-color: #2563eb;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="perfil">
        <img class="foto-perfil" src="https://placehold.co/160x160/2563eb/ffffff?text=Foto" alt="Foto de perfil">

        <h1>Mi perfil personal</h1>
        <p>Esta pagina ya fue revisada y los errores comunes fueron corregidos.</p>

        <ul>
            <li>Etiquetas HTML cerradas correctamente</li>
            <li>Clases de CSS escritas igual en HTML y CSS</li>
            <li>Enlaces completos con https://</li>
        </ul>

        <a class="boton" href="https://developer.mozilla.org/es/" target="_blank">
            Ver documentacion
        </a>
    </div>
</body>
</html>
